name: Agent Network Designer Tests

permissions:
  contents: read

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 PM UTC = 4:00 AM PT (standard)
  workflow_dispatch:      # enables manual triggering

jobs:
  agent-network-designer-test:
    # don't run this job in sync'd clones
    if: github.repository == 'cognizant-ai-lab/neuro-san-studio'
    # cognizant-ai-lab/build-common 1.0.3
    uses: cognizant-ai-lab/build-common/.github/workflows/_python-quality-gate.yml@a5d90457ea6e44b8f24f878755f77c00216e2947
    with:
      python-version: '3.13'
      # Required by build_scripts/server_start.sh:
      #   netcat-openbsd (nc, port readiness polling)
      #   procps         (ps, PID liveness check)
      #   net-tools      (netstat, final diagnostic)
      #   curl           (used elsewhere in CI)
      system-packages: 'curl netcat-openbsd procps net-tools'
      # No lint steps in the original workflow.
      lint-command-override: 'true'
      # `make install` creates the project venv that
      # build_scripts/server_start.sh sources before launching the
      # server, so we skip the gate's system-level pip install to
      # avoid installing requirements twice.
      requirements-file: ''
      requirements-build-file: ''
      run-pytest: false
      # Preserve the original install -> server_start -> pytest flow,
      # including the server.log dump on pytest failure.
      test-command-override: |
        set -euo pipefail
        make install
        # shellcheck source=/dev/null
        source venv/bin/activate
        export AGENT_TOOL_PATH="coded_tools/"
        export AGENT_MANIFEST_FILE="registries/manifest.hocon"
        export AGENT_TEMPORARY_NETWORK_UPDATE_PERIOD_SECONDS=5
        export PYTHONPATH=".:${PYTHONPATH:-}"
        build_scripts/server_start.sh
        if ! pytest --capture=no --verbose \
            -m "integration_agent_network_designer" --timer-top-n 100; then
          echo "===================================================="
          echo "=== Server Log ==="
          cat logs/server.log || echo "(no server.log found)"
          echo "===================================================="
          exit 1
        fi
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
