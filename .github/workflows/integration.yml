name: Integration Test

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    # cognizant-ai-lab/build-common 1.0.3
    uses: cognizant-ai-lab/build-common/.github/workflows/_python-quality-gate.yml@a5d90457ea6e44b8f24f878755f77c00216e2947
    with:
      python-version: '3.13'
      # No lint steps in the original workflow
      lint-command-override: 'true'
      run-pytest: false
      test-command-override: >-
        export OPENAI_API_VERSION="${{ vars.OPENAI_API_VERSION }}" &&
        export AGENT_TOOL_PATH="coded_tools/" &&
        export AGENT_MANIFEST_FILE="registries/manifest.hocon" &&
        export AGENT_TEMPORARY_NETWORK_UPDATE_PERIOD_SECONDS=5 &&
        export PYTHONPATH="${PYTHONPATH:+$PYTHONPATH:}." &&
        pytest --capture=no -m "integration"
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
